<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#fbf6ef" />
    <meta
      name="description"
      content="22 petali per 22 anni: un piccolo gioco romantico di compleanno."
    />
    <title>22 petali per 22 anni</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='15' r='14' fill='%23d9819a'/%3E%3Ccircle cx='49' cy='32' r='14' fill='%23eaaabd'/%3E%3Ccircle cx='32' cy='49' r='14' fill='%23d9819a'/%3E%3Ccircle cx='15' cy='32' r='14' fill='%23eaaabd'/%3E%3Ccircle cx='32' cy='32' r='12' fill='%23a74162'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#game-stage">Vai al gioco</a>

    <!-- Le decorazioni usano solo SVG originali e CSS: nessuna risorsa esterna. -->
    <svg class="svg-defs" aria-hidden="true" focusable="false">
      <defs>
        <symbol id="peony" viewBox="0 0 120 120">
          <g class="peony-leaves">
            <path d="M34 75C12 69 6 86 16 94c10 8 27-3 34-16" />
            <path d="M84 73c24-8 31 9 21 19-9 8-28-1-36-14" />
          </g>
          <g class="peony-petals">
            <ellipse cx="60" cy="30" rx="19" ry="30" />
            <ellipse cx="60" cy="30" rx="19" ry="30" transform="rotate(45 60 60)" />
            <ellipse cx="60" cy="30" rx="19" ry="30" transform="rotate(90 60 60)" />
            <ellipse cx="60" cy="30" rx="19" ry="30" transform="rotate(135 60 60)" />
            <ellipse class="petal-light" cx="60" cy="39" rx="17" ry="27" transform="rotate(22.5 60 60)" />
            <ellipse class="petal-light" cx="60" cy="39" rx="17" ry="27" transform="rotate(67.5 60 60)" />
            <ellipse class="petal-light" cx="60" cy="39" rx="17" ry="27" transform="rotate(112.5 60 60)" />
            <ellipse class="petal-light" cx="60" cy="39" rx="17" ry="27" transform="rotate(157.5 60 60)" />
            <circle class="peony-heart" cx="60" cy="60" r="18" />
            <circle class="peony-glow" cx="54" cy="53" r="6" />
          </g>
        </symbol>
      </defs>
    </svg>

    <div class="botanical botanical--left" aria-hidden="true">
      <svg class="edge-flower edge-flower--one"><use href="#peony"></use></svg>
      <svg class="edge-flower edge-flower--two white"><use href="#peony"></use></svg>
      <svg class="edge-flower edge-flower--three"><use href="#peony"></use></svg>
      <span class="stem stem--one"></span>
      <span class="stem stem--two"></span>
    </div>
    <div class="botanical botanical--right" aria-hidden="true">
      <svg class="edge-flower edge-flower--one white"><use href="#peony"></use></svg>
      <svg class="edge-flower edge-flower--two"><use href="#peony"></use></svg>
      <svg class="edge-flower edge-flower--three white"><use href="#peony"></use></svg>
      <span class="stem stem--one"></span>
      <span class="stem stem--two"></span>
    </div>

    <div id="petal-layer" class="petal-layer" aria-hidden="true"></div>

    <header class="topbar">
      <a class="mini-brand" href="#" data-action="home" aria-label="Torna all'inizio">
        <span aria-hidden="true">❀</span> 22 petali
      </a>
      <button class="restart-button" type="button" data-action="restart">
        Ricomincia il gioco
      </button>
    </header>

    <main class="app-shell">
      <section class="progress-shell" aria-label="Avanzamento del gioco">
        <div class="progress-copy">
          <span id="petal-indicator">La sorpresa comincia qui</span>
          <span id="progress-label">0%</span>
        </div>
        <div
          class="progress-track"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-labelledby="progress-label"
        >
          <span id="progress-fill" class="progress-fill"></span>
        </div>
      </section>

      <div id="game-stage" class="stage" tabindex="-1" aria-live="polite"></div>
    </main>

    <div id="modal" class="modal" hidden>
      <div class="modal__backdrop" data-action="close-modal"></div>
      <section class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal__close" type="button" data-action="close-modal" aria-label="Chiudi">×</button>
        <div class="modal__flower" aria-hidden="true">
          <svg><use href="#peony"></use></svg>
        </div>
        <p class="eyebrow">Conferma ufficialissima</p>
        <h2 id="modal-title">Prenotazione sentimentale confermata.</h2>
        <p>
          La vacanza comprende due notti, il mare, molte peonie virtuali
          e il tuo fidanzato incluso obbligatoriamente nel pacchetto.
        </p>
        <p class="modal__punchline">Nessun rimborso previsto.</p>
        <button class="primary-button" type="button" data-action="close-modal">Affare fatto</button>
      </section>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
